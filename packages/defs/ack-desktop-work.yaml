name: ack-desktop-work
version: 3
maintainer: Alberto Donato <packages@albertodonato.net>
title: metapackage for dependencies on a desktop machine for work
description: Whole set of packages for a desktop for work.
url: https://repo.albertodonato.net
distributions:
  - ubuntu
dependencies:
  - adwaita-icon-theme
  - dconf-editor
  - fonts-cantarell
  - fonts-hack
  - gnome-backgrounds
  - gnome-clocks
  - gnome-session
  - gnome-shell-extension-manager
  - gnome-tweaks
  - gnome-weather
  - nix-bin
  - nix-setup-systemd
  - openssh-server
  - vim
  - xclip
  - zsh
